services:
  - type: web
    name: shl-recommender
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set manually in Render dashboard — never stored in YAML
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
