services:
  - type: web
    name: shl-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt && python scripts/build_catalog.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: GEMINI_API_KEY
        sync: false
      - key: KMP_DUPLICATE_LIB_OK
        value: "TRUE"
