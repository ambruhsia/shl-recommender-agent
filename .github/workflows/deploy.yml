name: Deploy FastAPI to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4.2.2

    - name: Execute Remote SSH Commands to Deploy
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        port: 22
        script: |
          set -e

          # Clone on first deploy; pull on subsequent deploys
          if [ ! -d "fastapi-ml-app" ]; then
            git clone https://github.com/${{ github.repository }}.git fastapi-ml-app
          else
            git -C fastapi-ml-app fetch origin main
            git -C fastapi-ml-app reset --hard origin/main
          fi

          cd fastapi-ml-app

          # Build image (Dockerfile bakes FAISS index + ST model at build time)
          docker build -t fastapi-ml-app .

          # Rotate container — stop/rm are allowed to fail if container doesn't exist yet
          docker stop ml-api || true
          docker rm   ml-api || true

          # Dockerfile exposes 10000; map host port 80 → container port 10000
          docker run -d \
            --name ml-api \
            -p 80:10000 \
            --restart always \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            fastapi-ml-app
